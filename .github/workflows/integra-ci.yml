name: Integra CI/CD

on:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: |
          if npm run 2>&1 | grep -q '"test"'; then
            npm run test -- --run
          else
            echo "No test script found, skipping."
          fi

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to Hetzner gateway
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /root/integra-explorer
            git pull origin main
            docker compose -f docker/docker-compose.integra.yml build frontend
            docker compose -f docker/docker-compose.integra.yml up -d frontend
