# Integra Explorer — Docker Compose for Mainnet
# Usage: docker compose -f docker/docker-compose.mainnet.yml --env-file docker/.env.mainnet up -d
#
# Host already runs: Caddy (reverse proxy), integra-portal (port 3000),
# testnet validator, Blockscout, PM2 processes.
# We do NOT include Caddy or PgBouncer — Caddy on the host handles TLS/routing.

networks:
  explorer:
    driver: bridge

volumes:
  mainnet_pgdata:
    driver: local
  mainnet_redisdata:
    driver: local

services:
  postgres:
    image: timescale/timescaledb:2.11.1-pg14
    container_name: integra-mainnet-postgres
    restart: unless-stopped
    networks:
      - explorer
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ethernal
    volumes:
      - mainnet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6.2-alpine
    container_name: integra-mainnet-redis
    restart: unless-stopped
    networks:
      - explorer
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - mainnet_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  soketi:
    image: quay.io/soketi/soketi:1.6.1-16-debian
    container_name: integra-mainnet-soketi
    restart: unless-stopped
    networks:
      - explorer
    ports:
      - "6003:6001"
    environment:
      SOKETI_DEFAULT_APP_ID: default-app
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_SECRET}
      SOKETI_HOST: "0.0.0.0"
      SOKETI_PORT: "6001"
      SOKETI_SCHEME: "http"
      SOKETI_USE_TLS: ""

  backend:
    image: antoinedc44/ethernal-backend:latest
    container_name: integra-mainnet-backend
    restart: unless-stopped
    networks:
      - explorer
    ports:
      - "8891:8888"
    volumes:
      - ../run/lib/crypto.js:/app/lib/crypto.js:ro
      - ../run/middlewares/auth.js:/app/middlewares/auth.js:ro
      - ../run/middlewares/workspaceAuth.js:/app/middlewares/workspaceAuth.js:ro
      - ../run/app.js:/app/app.js:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      soketi:
        condition: service_started
    environment:
      # Database (direct connection, no PgBouncer)
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ethernal
      # Redis
      REDIS_URL: redis://redis:6379
      # Secrets
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_JWT_SECRET: ${ENCRYPTION_JWT_SECRET}
      SECRET: ${SECRET}
      # Soketi (WebSocket)
      SOKETI_DEFAULT_APP_ID: default-app
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_SECRET}
      SOKETI_HOST: soketi
      SOKETI_PORT: "6001"
      SOKETI_SCHEME: "http"
      SOKETI_USE_TLS: ""
      # App config
      APP_DOMAIN: ${APP_DOMAIN:-admin.explorer.integralayer.com}
      APP_URL: ${APP_URL:-admin.explorer.integralayer.com}
      SELF_HOSTED: "true"
      DEFAULT_PLAN_SLUG: self-hosted
      PORT: "8888"
      NODE_ENV: production
      CORS_DOMAIN: "https://scan.integralayer.com"
      # Auth
      AUTH_SECRET: ${AUTH_SECRET}
      FIREBASE_SIGNER_KEY: ${FIREBASE_SIGNER_KEY}
      FIREBASE_SALT_SEPARATOR: ${FIREBASE_SALT_SEPARATOR}
      FIREBASE_ROUNDS: "8"
      FIREBASE_MEM_COST: "14"
      # PM2 process manager
      PM2_HOST: http://pm2:9090
      PM2_SECRET: ${PM2_SECRET}
      # Bull Board (background job dashboard)
      BULLBOARD_USERNAME: ${BULLBOARD_USERNAME:-ethernal}
      BULLBOARD_PASSWORD: ${BULLBOARD_PASSWORD}

  high_priority_worker:
    image: antoinedc44/ethernal-backend:latest
    container_name: integra-mainnet-worker-high
    restart: unless-stopped
    networks:
      - explorer
    command: node workers/highPriority.js
    volumes:
      - ../run/lib/crypto.js:/app/lib/crypto.js:ro
      - ../run/middlewares/auth.js:/app/middlewares/auth.js:ro
      - ../run/middlewares/workspaceAuth.js:/app/middlewares/workspaceAuth.js:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ethernal
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_JWT_SECRET: ${ENCRYPTION_JWT_SECRET}
      SECRET: ${SECRET}
      SOKETI_DEFAULT_APP_ID: default-app
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_SECRET}
      SOKETI_HOST: soketi
      SOKETI_PORT: "6001"
      SOKETI_SCHEME: "http"
      SOKETI_USE_TLS: ""
      APP_DOMAIN: ${APP_DOMAIN:-admin.explorer.integralayer.com}
      APP_URL: ${APP_URL:-admin.explorer.integralayer.com}
      SELF_HOSTED: "true"
      DEFAULT_PLAN_SLUG: self-hosted
      NODE_ENV: production
      FIREBASE_SIGNER_KEY: ${FIREBASE_SIGNER_KEY}
      FIREBASE_SALT_SEPARATOR: ${FIREBASE_SALT_SEPARATOR}
      FIREBASE_ROUNDS: "8"
      FIREBASE_MEM_COST: "14"
      PM2_HOST: http://pm2:9090
      PM2_SECRET: ${PM2_SECRET}

  medium_priority_worker:
    image: antoinedc44/ethernal-backend:latest
    container_name: integra-mainnet-worker-medium
    restart: unless-stopped
    networks:
      - explorer
    command: node workers/mediumPriority.js
    volumes:
      - ../run/lib/crypto.js:/app/lib/crypto.js:ro
      - ../run/middlewares/auth.js:/app/middlewares/auth.js:ro
      - ../run/middlewares/workspaceAuth.js:/app/middlewares/workspaceAuth.js:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ethernal
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_JWT_SECRET: ${ENCRYPTION_JWT_SECRET}
      SECRET: ${SECRET}
      SOKETI_DEFAULT_APP_ID: default-app
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_SECRET}
      SOKETI_HOST: soketi
      SOKETI_PORT: "6001"
      SOKETI_SCHEME: "http"
      SOKETI_USE_TLS: ""
      APP_DOMAIN: ${APP_DOMAIN:-admin.explorer.integralayer.com}
      APP_URL: ${APP_URL:-admin.explorer.integralayer.com}
      SELF_HOSTED: "true"
      DEFAULT_PLAN_SLUG: self-hosted
      NODE_ENV: production
      FIREBASE_SIGNER_KEY: ${FIREBASE_SIGNER_KEY}
      FIREBASE_SALT_SEPARATOR: ${FIREBASE_SALT_SEPARATOR}
      FIREBASE_ROUNDS: "8"
      FIREBASE_MEM_COST: "14"
      PM2_HOST: http://pm2:9090
      PM2_SECRET: ${PM2_SECRET}

  low_priority_worker:
    image: antoinedc44/ethernal-backend:latest
    container_name: integra-mainnet-worker-low
    restart: unless-stopped
    networks:
      - explorer
    command: node workers/lowPriority.js
    volumes:
      - ../run/lib/crypto.js:/app/lib/crypto.js:ro
      - ../run/middlewares/auth.js:/app/middlewares/auth.js:ro
      - ../run/middlewares/workspaceAuth.js:/app/middlewares/workspaceAuth.js:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ethernal
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_JWT_SECRET: ${ENCRYPTION_JWT_SECRET}
      SECRET: ${SECRET}
      SOKETI_DEFAULT_APP_ID: default-app
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_SECRET}
      SOKETI_HOST: soketi
      SOKETI_PORT: "6001"
      SOKETI_SCHEME: "http"
      SOKETI_USE_TLS: ""
      APP_DOMAIN: ${APP_DOMAIN:-admin.explorer.integralayer.com}
      APP_URL: ${APP_URL:-admin.explorer.integralayer.com}
      SELF_HOSTED: "true"
      DEFAULT_PLAN_SLUG: self-hosted
      NODE_ENV: production
      FIREBASE_SIGNER_KEY: ${FIREBASE_SIGNER_KEY}
      FIREBASE_SALT_SEPARATOR: ${FIREBASE_SALT_SEPARATOR}
      FIREBASE_ROUNDS: "8"
      FIREBASE_MEM_COST: "14"
      PM2_HOST: http://pm2:9090
      PM2_SECRET: ${PM2_SECRET}

  pm2:
    image: antoinedc44/ethernal-pm2:latest
    container_name: integra-mainnet-pm2
    restart: unless-stopped
    networks:
      - explorer
    depends_on:
      backend:
        condition: service_started
    environment:
      SECRET: ${PM2_SECRET}
      ETHERNAL_HOST: http://backend:8888
      ETHERNAL_SECRET: ${SECRET}
      ETHERNAL_REDIS_URL: redis://redis:6379
      PORT: "9090"
      DEFAULT_POLLING_INTERVAL: "2000"
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "pm2 pid integra-mainnet 2>/dev/null | tail -1 | grep -qE '^[1-9][0-9]*$'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_PUSHER_KEY: ${SOKETI_KEY}
        NEXT_PUBLIC_PUSHER_HOST: "scan.integralayer.com"
        NEXT_PUBLIC_NETWORK_MODE: mainnet
        NEXT_PUBLIC_WORKSPACE_ID: "Integra Mainnet"
        NEXT_PUBLIC_COSMOS_API_URL: "https://mainnet.integralayer.com/api"
        NEXT_PUBLIC_SITE_URL: "https://scan.integralayer.com"
        NEXT_PUBLIC_REOWN_PROJECT_ID: ${REOWN_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_USER_ID: ${FIREBASE_USER_ID}
    container_name: integra-mainnet-frontend
    restart: unless-stopped
    networks:
      - explorer
    ports:
      - "3201:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_SECRET}
